<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neverwinter Forge Model Repository</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1110;
      --panel: #181b19;
      --ink: #f0eee8;
      --muted: #a7b0aa;
      --line: #343b36;
      --accent: #9d4a3b;
      --accent-dark: #c96b58;
      --ok-bg: #1f3b2b;
      --ok: #9fe2b3;
      --no-bg: #2b302c;
      --no: #c4ccc6;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.36);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #151816;
    }
    .wrap {
      width: min(1520px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 24px 0 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .count {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }
    .drive-link {
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent-dark);
      border-radius: 6px;
      padding: 10px 14px;
      text-decoration: none;
      white-space: nowrap;
      font-weight: 650;
    }
    main.wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 390px);
      gap: 18px;
      padding: 18px 0 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 14px;
      align-content: start;
    }
    .card {
      display: grid;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      color: inherit;
      min-width: 0;
    }
    .card[aria-selected="true"] {
      border-color: var(--accent);
      outline: 2px solid rgba(138, 63, 50, 0.22);
    }
    .thumbs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-height: 185px;
    }
    .thumbs img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center top;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #242925;
      display: block;
    }
    .card-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .badge {
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .badge.yes { color: var(--ok); background: var(--ok-bg); }
    .badge.no { color: var(--no); background: var(--no-bg); }
    .pane {
      position: sticky;
      top: 16px;
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .pane-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: #20241f;
    }
    .pane-images img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center top;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #242925;
    }
    .pane-body { padding: 16px; }
    .pane h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      line-height: 1.15;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .pane-description {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.94rem;
    }
    dl {
      display: grid;
      grid-template-columns: 135px minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0 0 16px;
      font-size: 0.95rem;
    }
    dt { color: var(--muted); }
    dd { margin: 0; overflow-wrap: anywhere; }
    .download {
      display: block;
      width: 100%;
      text-align: center;
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent-dark);
      border-radius: 6px;
      padding: 11px 12px;
      text-decoration: none;
      font-weight: 750;
    }
    .download:focus-visible, .drive-link:focus-visible, .card:focus-visible {
      outline: 3px solid rgba(98, 43, 36, 0.35);
      outline-offset: 2px;
    }
    @media (max-width: 900px) {
      .topbar { align-items: start; flex-direction: column; }
      main.wrap { grid-template-columns: 1fr; }
      .pane { position: static; order: -1; }
    }
    @media (max-width: 520px) {
      .wrap { width: min(100% - 20px, 1520px); }
      .grid { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; gap: 3px; }
    }
  </style>
</head>

  <script>
    const catalog = JSON.parse(document.getElementById('catalog-data').textContent);
    const collection = catalog.collections[0];
    const outfits = collection.outfits;
    const grid = document.getElementById('outfit-grid');
    const cards = new Map();

    function pathFor(path) {
      return path.split('/').map(encodeURIComponent).join('/');
    }

    function workflowLabel(outfit) {
      return outfit.substancePainterWorkflow ? 'Yes' : 'No';
    }

    function selectOutfit(outfit) {
      for (const [id, card] of cards) {
        card.setAttribute('aria-selected', id === outfit.id ? 'true' : 'false');
      }
      document.getElementById('pane-front').src = pathFor(outfit.frontImagePath);
      document.getElementById('pane-back').src = pathFor(outfit.backImagePath);
      document.getElementById('pane-front').alt = `${outfit.name} front`;
      document.getElementById('pane-back').alt = `${outfit.name} back`;
      document.getElementById('pane-title').textContent = outfit.name;
      document.getElementById('pane-description').textContent = outfit.description;
      document.getElementById('pane-collection').textContent = outfit.collection;
      document.getElementById('pane-category').textContent = outfit.category || 'Outfit';
      document.getElementById('pane-id').textContent = outfit.id;
      document.getElementById('pane-substance').textContent = workflowLabel(outfit);
      document.getElementById('pane-workflow-folder').textContent = outfit.substancePainterWorkflowFolders.length ? outfit.substancePainterWorkflowFolders.join(', ') : 'None';
      document.getElementById('pane-host').textContent = 'Google Drive';
      const link = document.getElementById('pane-download');
      link.href = outfit.downloadUrl;
      link.textContent = outfit.downloadText;
    }

    for (const outfit of outfits) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'card';
      card.setAttribute('aria-selected', 'false');
      card.innerHTML = `
        <div class="thumbs">
          <img src="${pathFor(outfit.frontImagePath)}" alt="${outfit.name} front">
          <img src="${pathFor(outfit.backImagePath)}" alt="${outfit.name} back">
        </div>
        <h3 class="card-title">${outfit.name}</h3>
        <div class="meta-row">
          <span>${outfit.id.replace('july-2026-', '')}</span>
          <span class="badge ${outfit.substancePainterWorkflow ? 'yes' : 'no'}">SP ${workflowLabel(outfit)}</span>
        </div>`;
      card.addEventListener('click', () => selectOutfit(outfit));
      cards.set(outfit.id, card);
      grid.appendChild(card);
    }

    selectOutfit(outfits[0]);
  </script>
